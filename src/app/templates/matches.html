<!DOCTYPE html>
<html>
<head>
    <title>Tennis Scoreboard - Matches</title>
    <style>
        ul { list-style-type: none; padding: 0; }
        li { margin: 10px 0; }
        a { text-decoration: none; color: blue; }
    </style>
</head>
<body>
    <h1>Matches</h1>
    <ul>
    {% for match in matches %}
        <li>
            {{ match.player1.name }} vs {{ match.player2.name }}: 
            {{ match.score | from_json | get_score }}
            (UUID: {{ match.uuid }})
            {% if match.winner %}
                - Winner: {{ match.winner.name }}
            {% endif %}
        </li>
    {% endfor %}
    </ul>
    <a href="/new-match">Create New Match</a>
</body>
</html>
